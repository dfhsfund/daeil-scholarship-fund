name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile || bun install
      - run: bun run build
        env:
          VITE_APPS_SCRIPT_URL: https://script.google.com/macros/s/AKfycbx0V_wN1yIdD6CTErZX6-sI9kaMA6f8-Yc5G-NDlUkFZJSe37jQUqc3j7chK8Nc2_Il/exec
          VITE_SHEET_URL: https://docs.google.com/spreadsheets/d/1AH6vKvz22jZlaV2s1WAogUJ5QyPiEZq3gOsWOvPv0l0/edit
          VITE_SITE_URL: https://fund.dflhs.or.kr

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
